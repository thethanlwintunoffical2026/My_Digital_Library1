<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Digital Library</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Google Fonts for aesthetic typography -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto&display=swap" rel="stylesheet" />
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #f5f5f5;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      background-image: url('grain-texture.png'); /* Optional grain overlay for cinematic feel */
      background-repeat: repeat;
    }

    /* Custom cursor */
    body {
      cursor: url('custom-cursor.png'), auto;
    }

    /* Scroll progress bar */
    #progressBar {
      position: fixed;
      top: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(to right, #ffd700, #fff8dc);
      width: 0%;
      z-index: 9999;
    }

    /* Hero section with floating 3D book stack */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3em;
      margin-bottom: 20px;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700;
    }

    /* Floating 3D book stack animation */
    .book-stack {
      width: 200px;
      height: 300px;
      perspective: 1000px;
      margin-bottom: 30px;
    }

    .book {
      width: 100px;
      height: 150px;
      background-color: #222;
      border: 2px solid #ffd700;
      border-radius: 4px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform-style: preserve-3d;
      transform-origin: bottom;
      animation: floatBooks 4s infinite ease-in-out;
    }

    /* Create multiple books with different positions and delays for a floating effect */
    .book:nth-child(1) {
      transform: translate(-50%, -50%) rotateX(10deg) translateZ(0);
      background-color: #333;
      animation-delay: 0s;
    }

    .book:nth-child(2) {
      transform: translate(-50%, -50%) rotateY(15deg) translateZ(10px);
      background-color: #444;
      animation-delay: 1s;
    }

    .book:nth-child(3) {
      transform: translate(-50%, -50%) rotateX(-10deg) translateZ(-10px);
      background-color: #555;
      animation-delay: 2s;
    }

    @keyframes floatBooks {
      0%, 100% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -55%) translateY(-10px); }
    }

    /* Custom search box and controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      max-width: 1200px;
      width: 90%;
      margin: 0 auto 40px;
      padding: 10px;
      background-color: rgba(18, 18, 18, 0.8);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      background-color: #222;
      color: #f5f5f5;
    }

    select, button {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }

    button {
      background-color: #ffd700;
      color: #222;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #e6c200;
    }

    /* Book list grid */
    .library {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .book-card {
      background-color: #1e1e1e;
      border: 2px solid #ffd700;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 15px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .book-cover {
      height: 250px;
      background-color: #222;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
      color: #ccc;
    }

    .book-details {
      flex: 1;
    }

    .book-title {
      font-size: 1.2em;
      margin-bottom: 8px;
      font-weight: bold;
      color: #ffd700;
    }

    .book-author {
      font-size: 1em;
      margin-bottom: 8px;
    }

    .book-genre {
      font-size: 0.9em;
      margin-bottom: 8px;
    }

    /* Featured section */
    .featured {
      padding: 40px 20px;
      background-color: rgba(18, 18, 18, 0.9);
      margin-top: 40px;
    }

    .featured h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2em;
      margin-bottom: 20px;
      color: #ffd700;
    }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 20px;
      background: #222;
      margin-top: 40px;
      border-radius: 10px;
      box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2);
    }

    .stat {
      font-size: 1.2em;
      color: #ffd700;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #888;
      margin-top: 40px;
    }

    /* Responsive adjustments */
    @media(max-width: 768px){
      .hero h1 {
        font-size: 2em;
      }
      .controls {
        flex-direction: column;
      }
      .stats {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <!-- Scroll Progress Bar -->
  <div id="progressBar"></div>

  <!-- Hero Section with animated books -->
  <section class="hero">
    <h1>My Digital Library</h1>
    <div class="book-stack">
      <div class="book"></div>
      <div class="book"></div>
      <div class="book"></div>
    </div>
    <p style="color:#ccc; max-width:600px; margin:auto;">Orchestrated dark-themed digital library with aesthetic design elements</p>
  </section>

  <!-- Controls: Add/Search/Filter -->
  <section class="controls">
    <input type="text" id="searchInput" placeholder="Search by Title, Author, Genre" />
    <button id="addBookBtn">Add Book</button>
    <select id="statusFilter">
      <option value="All">All</option>
      <option value="Reading">Reading</option>
      <option value="Completed">Completed</option>
      <option value="Want to Read">Want to Read</option>
    </select>
  </section>

  <!-- Library Grid -->
  <section class="library" id="library"></section>

  <!-- Featured Section -->
  <section class="featured" id="featuredSection">
    <h2>Featured Book</h2>
    <div id="featuredBook">No books yet.</div>
  </section>

  <!-- Stats Bar -->
  <section class="stats" id="statsBar">
    <div class="stat" id="totalBooks">Total Books: 0</div>
    <div class="stat" id="genresCount">Genres: 0</div>
    <div class="stat" id="completedCount">Completed: 0</div>
  </section>

  <!-- Footer -->
  <footer>
    &copy; 2024 My Digital Library. All rights reserved.
  </footer>

  <!-- JavaScript for functionality -->
  <script>
    // Data and State
    let books = [];
    let filteredBooks = [];
    let currentFilter = 'All';

    // Load from localStorage
    if(localStorage.getItem('books')){
      books = JSON.parse(localStorage.getItem('books'));
    }

    // DOM Elements
    const libraryEl = document.getElementById('library');
    const searchInput = document.getElementById('searchInput');
    const statusFilter = document.getElementById('statusFilter');
    const featuredBookEl = document.getElementById('featuredBook');
    const totalBooksEl = document.getElementById('totalBooks');
    const genresCountEl = document.getElementById('genresCount');
    const completedCountEl = document.getElementById('completedCount');

    // Utility functions
    function saveBooks() {
      localStorage.setItem('books', JSON.stringify(books));
    }

    function updateStats() {
      totalBooksEl.textContent = 'Total Books: ' + books.length;
      const genres = [...new Set(books.map(b => b.genre))];
      genresCountEl.textContent = 'Genres: ' + genres.length;
      const completed = books.filter(b => b.status === 'Completed').length;
      completedCountEl.textContent = 'Completed: ' + completed;
    }

    function renderBooks() {
      // Filter books based on search and filter
      filteredBooks = books.filter(b => {
        const searchTerm = searchInput.value.toLowerCase();
        const matchesSearch = b.title.toLowerCase().includes(searchTerm) ||
                              b.author.toLowerCase().includes(searchTerm) ||
                              b.genre.toLowerCase().includes(searchTerm);
        const matchesFilter = (currentFilter === 'All') || (b.status === currentFilter);
        return matchesSearch && matchesFilter;
      });

      // Clear current display
      libraryEl.innerHTML = '';

      if(filteredBooks.length === 0){
        libraryEl.innerHTML = '<p style="color:#ccc; text-align:center;">No books found</p>';
        return;
      }

      // Render each book card
      filteredBooks.forEach(book => {
        const card = document.createElement('div');
        card.className = 'book-card';

        const cover = document.createElement('div');
        cover.className = 'book-cover';
        cover.style.backgroundColor = book.coverColor || '#222';
        cover.textContent = 'Cover';

        const details = document.createElement('div');
        details.className = 'book-details';

        const title = document.createElement('div');
        title.className = 'book-title';
        title.textContent = book.title;

        const author = document.createElement('div');
        author.className = 'book-author';
        author.textContent = 'by ' + book.author;

        const genre = document.createElement('div');
        genre.className = 'book-genre';
        genre.textContent = 'Genre: ' + book.genre;

        const yearPages = document.createElement('div');
        yearPages.textContent = `Year: ${book.year} | Pages: ${book.pages}`;

        const status = document.createElement('div');
        status.textContent = 'Status: ' + book.status;

        // Append
        details.appendChild(title);
        details.appendChild(author);
        details.appendChild(genre);
        details.appendChild(yearPages);
        details.appendChild(status);

        card.appendChild(cover);
        card.appendChild(details);
        libraryEl.appendChild(card);
      });
    }

    // Add Book Functionality
    document.getElementById('addBookBtn').addEventListener('click', () => {
      const title = prompt('Enter Book Title:');
      if(!title) return alert('Title is required');
      const author = prompt('Enter Author:');
      const genre = prompt('Enter Genre:');
      const year = prompt('Enter Year:');
      const pages = prompt('Enter Pages:');
      const status = prompt('Enter Status (Reading / Completed / Want to Read):');
      const description = prompt('Description:');
      const coverColor = prompt('Cover Color (e.g., #ff0000 or red):');

      const newBook = {
        id: Date.now(),
        title,
        author,
        genre,
        year,
        pages,
        status,
        description,
        coverColor
      };
      books.push(newBook);
      saveBooks();
      updateStats();
      renderBooks();
      updateFeatured();
    });

    // Search input event
    searchInput.addEventListener('input', () => {
      renderBooks();
    });

    // Filter change event
    statusFilter.addEventListener('change', () => {
      currentFilter = statusFilter.value;
      renderBooks();
    });

    // Update Featured Book
    function updateFeatured() {
      if(books.length === 0){
        featuredBookEl.textContent = 'No books yet.';
        return;
      }
      // Highlight latest book
      const latestBook = books[books.length -1];
      featuredBookEl.innerHTML = `
        <h3>${latestBook.title}</h3>
        <p>by ${latestBook.author}</p>
        <p>Genre: ${latestBook.genre}</p>
        <p>Status: ${latestBook.status}</p>
        <p>${latestBook.description}</p>
      `;
    }

    // Initialize
    updateStats();
    renderBooks();
    updateFeatured();

    // Keyboard shortcut for search (⌘K)
    document.addEventListener('keydown', (e) => {
      if(e.metaKey && e.key === 'k'){
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Scroll progress bar
    window.onscroll = () => {
      const scrollTop = document.documentElement.scrollTop;
      const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrollPercent = (scrollTop / scrollHeight) * 100;
      document.getElementById('progressBar').style.width = scrollPercent + '%';
    };
  </script>
</body>
</html>
