<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Digital Library </title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --bg2: #111111; --ink: #f0ead6; --ink2: #9a9080; 
  --ink3: #5a5448; --gold: #c9a84c; --border: rgba(201,168,76,0.15);
}
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--ink); font-family: 'DM Mono', monospace; line-height: 1.7; }
header { position:fixed; top:0; left:0; right:0; z-index:100; padding:0 4rem; height:72px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(to bottom,rgba(10,10,10,0.98),transparent); border-bottom:1px solid var(--border); }
.logo { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:900; color:var(--gold); text-decoration:none; }

.hero { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
.hero-left { padding:10rem 4rem 6rem; }
.hero-title { font-family:'Playfair Display',serif; font-size:clamp(3.8rem,7vw,6.5rem); font-weight:900; line-height:0.95; }
.hero-title em { color:var(--gold); font-style:italic; }

.search-wrap { padding:2.5rem 4rem; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
.search-input { flex:1; background:none; border:none; border-bottom:1px solid var(--ink3); padding:0.8rem 0; font-size:1rem; color:var(--ink); min-width:280px; }
.sort-select { background:var(--bg2); border:1px solid var(--border); color:var(--ink); padding:0.8rem; }

.books-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px,1fr)); gap:2rem; padding:3rem 4rem; }
.book-card { background:var(--bg2); border:1px solid var(--border); padding:2rem; transition:all 0.4s; }
.book-card:hover { transform:translateY(-8px); box-shadow:0 20px 40px rgba(0,0,0,0.6); }
.book-cover { width:100%; height:420px; object-fit:cover; box-shadow:0 10px 30px rgba(0,0,0,0.7); margin-bottom:1.5rem; }
.book-title { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:0.4rem; }
.book-author { color:var(--ink2); font-size:1.05rem; margin-bottom:1rem; }
.review-text { font-family:'Cormorant Garamond',serif; font-size:1.02rem; color:var(--ink2); font-style:italic; line-height:1.75; margin:1.2rem 0; }

.rating { font-size:1.4rem; color:var(--gold); margin:0.8rem 0; }
.progress { height:6px; background:#333; margin:1rem 0; border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); }

@media (max-width: 768px) {
  .books-grid { grid-template-columns:1fr; padding:2rem 1.5rem; }
  header { padding:0 1.5rem; }
}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">MDL <span>Bibliotheca</span></a>
</header>

<section class="hero">
  <div class="hero-left">
    <div style="letter-spacing:0.25em; color:var(--gold); font-size:0.75rem;">MY PERSONAL LIBRARY</div>
    <h1 class="hero-title">A Library<br><em>is not</em><br>a church.</h1>
    <p style="color:var(--ink2); max-width:460px; margin-top:2rem;">Here are the books that mattered to me — with my honest thoughts and reviews.</p>
  </div>
</section>

<div class="search-wrap">
  <input type="text" id="searchInput" class="search-input" placeholder="Search title, author, or genre...">
  <select id="sortSelect" class="sort-select">
    <option value="title">Title A-Z</option>
    <option value="author">Author A-Z</option>
    <option value="year">Year (Newest First)</option>
  </select>
</div>

<div class="books-grid" id="booksGrid"></div>

<script>
// ==================== MY BOOKS WITH FULL REVIEWS (ဒီနေရာမှာ မင်း စာအုပ်တွေ ထည့်ပြင်ပါ) ====================
const books = [
  {
    title: "Dune",
    author: "Frank Herbert",
    year: "1965",
    pages: "412",
    genre: "Science Fiction",
    cover: "https://picsum.photos/id/1015/800/1200",
    rating: 5,
    progress: 100,
    review: "ဒီစာအုပ်က ငါ့ဘဝမှာ အကောင်းဆုံး sci-fi တစ်အုပ်ပဲ။ ကမ္ဘာ့အဆုံးမဲ့ သဲကန္တာရ၊ နိုင်ငံရေး ရုန်းကန်မှု၊ ဘာသာရေး နဲ့ စွမ်းအားတွေ အားလုံး ပြီးပြည့်စုံတယ်။ Paul Atreides ရဲ့ ခရီးက တကယ်ကို စိတ်ဝင်စားဖို့ကောင်းတယ်။ ဖတ်ပြီးရင် ကမ္ဘာကြီးကို တခြားမျက်စိနဲ့ ကြည့်မိတယ်။"
  },
  {
    title: "The Secret History",
    author: "Donna Tartt",
    year: "1992",
    pages: "559",
    genre: "Fiction / Dark Academia",
    cover: "https://picsum.photos/id/237/800/1200",
    rating: 5,
    progress: 85,
    review: "Dark academia ရဲ့ ဘုရင်မပဲ။ ဂန္ထဝင်စာပေ ကျောင်းသားတွေ ရဲ့ လျှို့ဝှက်ချက်နဲ့ လူသတ်မှု က စိတ်ကို မချုပ်နိုင်ဘူး။ စာရေးပုံစံက အရမ်းလှတယ်။ ဖတ်ရင်း ကိုယ်တိုင် အဲဒီ ကျောင်းထဲ ရောက်နေသလို ခံစားရတယ်။"
  },
  {
    title: "1984",
    author: "George Orwell",
    year: "1949",
    pages: "328",
    genre: "Dystopian",
    cover: "https://picsum.photos/id/201/800/1200",
    rating: 5,
    progress: 100,
    review: "ဒီစာအုပ်က အချိန်မရွေး ဖတ်သင့်တယ်။ အာဏာရှင်စနစ်၊ လူ့အခွင့်အရေး နဲ့ လွတ်လပ်မှု အကြောင်း အရမ်းပြင်းထန်စွာ ရေးထားတယ်။ Big Brother ဆိုတဲ့ စကားလုံး က အခုချိန်ထိ သက်ဆိုင်နေဆဲပဲ။"
  },
  {
    title: "The Name of the Wind",
    author: "Patrick Rothfuss",
    year: "2007",
    pages: "662",
    genre: "Fantasy",
    cover: "https://picsum.photos/id/133/800/1200",
    rating: 4,
    progress: 70,
    review: "Kvothe ရဲ့ ဇာတ်လမ်း က အရမ်းဆွဲဆောင်မှု ရှိတယ်။ စာရေးပုံစံ က ကဗျာဆန်ဆန် လှတယ်။ ဒါပေမယ့် တတိယပုံစံ မထွက်သေးတာ စိတ်မကောင်းစရာ။"
  },
  {
    title: "Sapiens",
    author: "Yuval Noah Harari",
    year: "2011",
    pages: "443",
    genre: "Non-Fiction / History",
    cover: "https://picsum.photos/id/180/800/1200",
    rating: 5,
    progress: 95,
    review: "လူသားသမိုင်း ကို ဒီလောက် ရှင်းရှင်းလင်းလင်း ရေးထားတာ တကယ်ကို ထူးခြားတယ်။ ငါ့ အမြင်ကို အပြည့်အစုံ ပြောင်းလဲပေးခဲ့တယ်။ လူတိုင်း ဖတ်သင့်တယ်။"
  }
  // နောက်ထပ် စာအုပ်ထည့်ချင်ရင် ဒီနေရာမှာ ကော်ပီကူးပြီး ပြင်ပါ
];

function renderBooks() {
  const grid = document.getElementById('booksGrid');
  let filtered = [...books];

  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (query) {
    filtered = filtered.filter(b => 
      b.title.toLowerCase().includes(query) || 
      b.author.toLowerCase().includes(query) ||
      b.genre.toLowerCase().includes(query)
    );
  }

  const sort = document.getElementById('sortSelect').value;
  if (sort === 'author') filtered.sort((a,b) => a.author.localeCompare(b.author));
  else if (sort === 'year') filtered.sort((a,b) => parseInt(b.year) - parseInt(a.year));
  else filtered.sort((a,b) => a.title.localeCompare(b.title));

  grid.innerHTML = filtered.map(book => `
    <div class="book-card">
      <img src="${book.cover}" class="book-cover" alt="${book.title}">
      <div class="book-title">${book.title}</div>
      <div class="book-author">by ${book.author} (${book.year})</div>
      <div style="color:var(--gold); font-size:0.85rem;">${book.genre} • ${book.pages} pages</div>
      
      <div class="rating">
        ${'★'.repeat(book.rating)}${'☆'.repeat(5 - book.rating)}
      </div>
      
      <div class="progress"><div class="progress-fill" style="width:${book.progress}%"></div></div>
      <small style="color:var(--ink3);">${book.progress}% completed</small>
      
      <div class="review-text">"${book.review}"</div>
    </div>
  `).join('');
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', renderBooks);
document.getElementById('sortSelect').addEventListener('change', renderBooks);

// Initialize
renderBooks();
</script>
</body>
</html>
