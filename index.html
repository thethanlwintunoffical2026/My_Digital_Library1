<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Digital Library • Bibliotheca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
  --ink: #f0ead6; --ink2: #9a9080; --ink3: #5a5448;
  --gold: #c9a84c; --gold2: #e8c97a; --border: rgba(201,168,76,0.15);
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'DM Mono', monospace; overflow-x: hidden;
}
header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 0 4rem; height: 72px; display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(10,10,10,0.98), transparent);
  border-bottom: 1px solid var(--border); backdrop-filter: blur(12px);
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 900; color: var(--gold); text-decoration: none; }
.hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; }
.hero-left { padding: 10rem 4rem 6rem; }
.hero-title { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem, 6vw, 6rem); font-weight: 900; line-height: 0.95; }
.hero-title em { color: var(--gold); font-style: italic; }

.books-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0;
}
.book-card {
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  padding: 2.5rem; transition: background 0.4s;
}
.book-card:hover { background: rgba(201,168,76,0.04); }
.book-card-cover {
  width: 100%; aspect-ratio: 3/4; margin-bottom: 1.2rem;
  box-shadow: -4px 4px 20px rgba(0,0,0,0.6); overflow: hidden;
}
.book-card-cover img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.book-card:hover img { transform: scale(1.05); }
.book-card-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 0.4rem; }
.book-card-author { color: var(--ink2); margin-bottom: 0.8rem; }
.progress-bar { height: 5px; background: var(--gold); margin: 10px 0; border-radius: 3px; }

.search-wrap {
  padding: 2rem 4rem; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; gap: 1rem; align-items: center;
}
.search-input { flex: 1; background: none; border: none; border-bottom: 1px solid var(--ink3); padding: 0.8rem 0; color: var(--ink); font-size: 1rem; }
.sort-select { background: var(--bg3); border: 1px solid var(--border); color: var(--ink); padding: 0.8rem; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--gold); padding: 1rem 2rem; color: var(--gold); z-index: 9999; opacity: 0; transition: all 0.4s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

@media (max-width: 768px) {
  header { padding: 0 1.5rem; }
  .hero { grid-template-columns: 1fr; }
  .books-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">MDL <span>Bibliotheca</span></a>
  <nav>
    <a href="#collection">My Collection</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-left">
    <div style="font-size:0.7rem; letter-spacing:0.25em; color:var(--gold);">PERSONAL LIBRARY</div>
    <h1 class="hero-title">A Library<br><em>is not</em><br>a church.</h1>
    <p style="max-width:420px; color:var(--ink2); font-size:1.1rem; margin-top:1.5rem;">Curated books that shaped my thoughts. Feel free to browse.</p>
  </div>
</section>

<section id="collection">
  <div class="search-wrap">
    <input type="text" id="searchInput" class="search-input" placeholder="Search by title, author or genre...">
    <select id="sortSelect" class="sort-select">
      <option value="title">Title A-Z</option>
      <option value="author">Author A-Z</option>
      <option value="year">Year (Newest)</option>
    </select>
  </div>

  <div class="books-grid" id="booksGrid"></div>
</section>

<div class="toast" id="toast"></div>

<script>
// ==================== HARDCODED BOOKS (ဒီနေရာမှာ မင်း စာအုပ်တွေ ထည့်ပါ) ====================
const books = [
  {
    title: "Dune",
    author: "Frank Herbert",
    genre: "Science Fiction",
    year: "1965",
    pages: "412",
    desc: "A desert planet, spice, and the rise of a messiah.",
    cover: "https://picsum.photos/id/1015/400/600", // လိုချင်ရင် တကယ့် cover URL ထည့်ပါ
    rating: 5,
    progress: 100
  },
  {
    title: "The Secret History",
    author: "Donna Tartt",
    genre: "Fiction",
    year: "1992",
    pages: "559",
    desc: "Dark academia, classics students, and one cold-blooded murder.",
    cover: "https://picsum.photos/id/237/400/600",
    rating: 5,
    progress: 80
  },
  {
    title: "1984",
    author: "George Orwell",
    genre: "Dystopian",
    year: "1949",
    pages: "328",
    desc: "Big Brother is watching you.",
    cover: "https://picsum.photos/id/201/400/600",
    rating: 5,
    progress: 100
  },
  {
    title: "The Name of the Wind",
    author: "Patrick Rothfuss",
    genre: "Fantasy",
    year: "2007",
    pages: "662",
    desc: "The greatest wizard story never finished.",
    cover: "https://picsum.photos/id/133/400/600",
    rating: 4,
    progress: 65
  },
  {
    title: "Sapiens",
    author: "Yuval Noah Harari",
    genre: "Non-Fiction",
    year: "2011",
    pages: "443",
    desc: "A brief history of humankind.",
    cover: "https://picsum.photos/id/180/400/600",
    rating: 5,
    progress: 90
  },
  {
    title: "Pride and Prejudice",
    author: "Jane Austen",
    genre: "Classic",
    year: "1813",
    pages: "279",
    desc: "It is a truth universally acknowledged...",
    cover: "https://picsum.photos/id/201/400/600",
    rating: 4,
    progress: 45
  },
  {
    title: "Educated",
    author: "Tara Westover",
    genre: "Memoir",
    year: "2018",
    pages: "352",
    desc: "A memoir of a young woman who escapes a survivalist family.",
    cover: "https://picsum.photos/id/251/400/600",
    rating: 5,
    progress: 100
  },
  {
    title: "The Midnight Library",
    author: "Matt Haig",
    genre: "Fiction",
    year: "2020",
    pages: "304",
    desc: "Between life and death there is a library.",
    cover: "https://picsum.photos/id/870/400/600",
    rating: 4,
    progress: 70
  }
];

// ==================== RENDER BOOKS ====================
function renderBooks() {
  const grid = document.getElementById('booksGrid');
  let filtered = [...books];

  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  if (query) {
    filtered = filtered.filter(b => 
      b.title.toLowerCase().includes(query) || 
      b.author.toLowerCase().includes(query) ||
      b.genre.toLowerCase().includes(query)
    );
  }

  const sortMode = document.getElementById('sortSelect').value;
  if (sortMode === 'author') filtered.sort((a,b) => a.author.localeCompare(b.author));
  else if (sortMode === 'year') filtered.sort((a,b) => parseInt(b.year) - parseInt(a.year));
  else filtered.sort((a,b) => a.title.localeCompare(b.title));

  grid.innerHTML = filtered.map(book => `
    <div class="book-card">
      <div class="book-card-cover">
        <img src="${book.cover}" alt="${book.title}">
      </div>
      <div class="book-card-title">${book.title}</div>
      <div class="book-card-author">by ${book.author}</div>
      <div style="font-size:0.75rem; color:var(--ink3);">${book.genre} • ${book.year} • ${book.pages} pages</div>
      
      <div style="margin:12px 0 8px;">
        ${Array(5).fill(0).map((_,i) => `<span style="color:${i < book.rating ? '#c9a84c' : '#444'}; font-size:1.1rem;">★</span>`).join('')}
      </div>
      
      <div class="progress-bar" style="width: ${book.progress}%"></div>
      <small style="color:var(--ink3);">${book.progress}% read</small>
      
      <p style="margin-top:1rem; font-size:0.9rem; color:var(--ink2); line-height:1.5; font-style:italic;">${book.desc}</p>
    </div>
  `).join('');
}

// ==================== EVENT LISTENERS ====================
document.getElementById('searchInput').addEventListener('input', renderBooks);
document.getElementById('sortSelect').addEventListener('change', renderBooks);

// Init
renderBooks();
</script>
</body>
</html>
