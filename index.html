<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Library</h1>
            <p>Personal Collection • Private</p>
        </header>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Search title or author...">
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="fiction">Fiction</button>
            <button class="filter-btn" data-filter="nonfiction">Non-Fiction</button>
            <button class="filter-btn" data-filter="other">Other</button>
        </div>

        <div class="book-grid" id="bookGrid"></div>
    </div>

    <footer>
        <p>My private digital library</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
